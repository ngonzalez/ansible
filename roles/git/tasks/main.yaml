# git
- name: Install git-core
  tags: git
  apt:
    name: git-core

- name: Configure git
  tags: git
  command: "{{ item.command }}"
  loop:
    - { command: "git config --global core.editor vim" }
    - { command: "git config --global core.pager less" }

- name: Add .gitconfig
  tags: git
  template:
    src: gitconfig
    dest: /root/.gitconfig
    owner: root
    group: root
    mode: 0644
