# grafana
- name: Add grafana repository
  tags: admin grafana
  shell:
    chdir: "{{ admin_path }}"
    cmd: helm repo add grafana https://grafana.github.io/helm-charts

- name: Install grafana
  tags: admin grafana
  shell:
    chdir: "{{ admin_path }}"
    cmd: helm upgrade --install -f helm/grafana.yaml grafana grafana/grafana --namespace development

- name: Set grafana service external IP
  tags: admin grafana
  shell:
    chdir: "{{ admin_path }}"
    cmd: kubectl -n development patch svc grafana -p '{"spec":{"externalIPs":["{{ apiserver_advertise_address }}"]}}'

- name: Login to grafana
  tags: admin grafana grafana-login
  register: grafanapasswd  
  shell:
    chdir: "{{ admin_path }}"
    cmd: kubectl get secret --namespace development grafana -o jsonpath="{.data.admin-password}" | base64 --decode

- name: Debug
  tags: admin grafana grafana-login
  debug:
    var: grafanapasswd

# kubernetes-dashboard
- name: Add kubernetes-dashboard
  tags: admin kubernetes-dashboard
  shell:
    chdir: "{{ admin_path }}"
    cmd: kubectl apply -f deploy/kubernetes-dashboard.yaml

- name: Set kubernetes-dashboard service external IP
  tags: admin kubernetes-dashboard
  command: kubectl -n kubernetes-dashboard patch svc kubernetes-dashboard -p '{"spec":{"externalIPs":["{{ apiserver_advertise_address }}"]}}'

# kubernetes-dashboard service-account
- name: Setup Service Account Admin User
  tags: admin kubernetes-dashboard
  shell:
    chdir: "{{ admin_path }}"
    cmd: kubectl apply -f service-account/admin-user.yaml

- name: Setup Service Account Cluster Admin
  tags: admin kubernetes-dashboard
  shell:
    chdir: "{{ admin_path }}"
    cmd: kubectl apply -f service-account/cluster-admin.yaml

- name: Generate Service Account Token
  tags: admin kubernetes-dashboard
  register: kubernetesdashboardtoken
  shell:
    chdir: "{{ admin_path }}"
    cmd: kubectl -n kubernetes-dashboard create token admin-user

- name: Debug
  tags: admin kubernetes-dashboard
  debug:
    var: kubernetesdashboardtoken
