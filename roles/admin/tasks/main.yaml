# app-backend
- name: Include vault
  tags: app-backend
  include_vars: env_vault_backend.yaml

- name: Create environment temporary configuration file
  tags: admin app-backend
  template:
    src: app-backend.env.j2
    dest: /tmp/.env
    owner: root
    group: root
    mode: 0644
  no_log: True

- name: Create environment secret
  tags: admin app-backend
  shell:
    chdir: "{{ admin_path }}"
    cmd: kubectl create secret generic app-backend-env --namespace=development --from-file=/tmp/.env --dry-run=client -o yaml | kubectl -n development replace --force -f -

- name: Remove environment temporary configuration file
  tags: admin app-backend
  ansible.builtin.file:
    path: /tmp/.env
    state: absent
  no_log: True

- name: Create app-backend deployment
  tags: admin app-backend
  shell:
    chdir: "{{ admin_path }}"
    cmd: kubectl -n development replace --force -f deploy/app-backend.yaml

- name: Create app-backend loadbalancer
  tags: admin app-backend
  shell:
    chdir: "{{ admin_path }}"
    cmd: kubectl -n development replace --force -f service/app-backend.yaml

- name: Set app-backend service external IP
  tags: admin app-backend
  shell:
    chdir: "{{ admin_path }}"
    cmd: kubectl -n development patch svc app-backend-loadbalancer -p '{"spec":{"externalIPs":["{{ apiserver_advertise_address }}"]}}'

